name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., 0.1.0). If left blank, it will auto-detect and bump the patch version number.'
        required: false
        default: ''

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: get_version
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if ($inputVersion) {
            $version = $inputVersion
          } else {
            # Try to fetch latest tag from git
            git fetch --tags
            $latestTag = git describe --tags --abbrev=0 2>$null
            Write-Host "Latest Git Tag found: $latestTag"
            
            if ($latestTag -and $latestTag -match 'v?(\d+\.\d+\.\d+)') {
              $base = $Matches[1]
              $parts = $base.Split('.')
              $patch = [int]$parts[2] + 1
              $version = "$($parts[0]).$($parts[1]).$patch"
            } else {
              # Fallback if no tags exist
              $version = "0.1.0"
            }
          }
          
          # Strip 'v' prefix if typed and trim whitespace
          $version = ($version -replace '^v', '').Trim()
          
          # Set as output safely in UTF-8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "VERSION=$version"
          Write-Host "Resolved Target Release Version: $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Set Version in Project Files
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $version = $version.Trim()
          
          # Update package.json version
          (Get-Content package.json) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content package.json
          
          # Update tauri.conf.json version
          (Get-Content src-tauri/tauri.conf.json) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content src-tauri/tauri.conf.json
          
          # Update Cargo.toml version
          (Get-Content src-tauri/Cargo.toml) -replace '^version\s*=\s*"[^"]+"', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml
          
          Write-Host "Updated project configuration versions to $version"

      - name: Commit version bump
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $version = $version.Trim()
          git config --local user.email "106017926+kil0bit-kb@users.noreply.github.com"
          git config --local user.name "kil0bit-kb"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $version [skip ci]" --allow-empty
          git push origin main

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.get_version.outputs.VERSION }}
          releaseName: 'KB Android Emulator Manager v${{ steps.get_version.outputs.VERSION }}'
          releaseBody: '🚀 Standalone GPU-accelerated Android Emulator Manager for Windows (Beta).'
          releaseDraft: true
          prerelease: true
